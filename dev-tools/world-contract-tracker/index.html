<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Contract Tracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>World Contract Tracker</h1>
      <p class="subtitle">Comparing on-chain deployments against <a href="https://github.com/evefrontier/world-contracts" target="_blank">evefrontier/world-contracts</a></p>
      <div class="header-actions">
        <span id="last-updated" class="muted"></span>
        <button id="refresh-btn" class="btn">Refresh</button>
      </div>
    </header>

    <div id="loading" class="loading">Loading…</div>
    <div id="error" class="error-banner hidden"></div>
    <div id="environments" class="env-grid"></div>
    <section id="releases-section" class="releases-section hidden">
      <h2>Recent Releases</h2>
      <div id="releases"></div>
    </section>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
