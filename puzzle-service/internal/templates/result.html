{{define "result.html"}}{{if .Correct}}<div class="boot-line boot-line--correct">✓ pattern recognized: {{.Word}}</div>
<div class="boot-line boot-line--sys">[SYS] stability: {{.Stability}}/100</div>
{{if .ShowNext}}<div class="boot-line boot-line--sys">[SYS] type 'next' to continue</div>{{end}}
{{else}}<div class="boot-line boot-line--incorrect">✗ noise detected</div>
<div class="boot-line boot-line--sys">[SYS] corruption: {{.Corruption}}/100</div>
{{end}}{{template "meters.html" .}}{{end}}
