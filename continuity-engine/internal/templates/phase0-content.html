{{define "phase0-content.html"}}<div class="starmap">
    <svg class="starmap-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- Grid overlay — ancient coordinate system -->
        <defs>
            <pattern id="grid-fine" width="50" height="50" patternUnits="userSpaceOnUse">
                <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(42,42,58,0.4)" stroke-width="0.5"/>
            </pattern>
            <pattern id="grid-coarse" width="200" height="200" patternUnits="userSpaceOnUse">
                <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(42,42,58,0.7)" stroke-width="0.8"/>
            </pattern>
            <radialGradient id="focal-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(0,255,136,0.4)"/>
                <stop offset="40%" stop-color="rgba(0,212,255,0.15)"/>
                <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <filter id="noise">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
                <feColorMatrix type="saturate" values="0"/>
                <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.06"/>
                </feComponentTransfer>
            </filter>
        </defs>

        <!-- Background layers -->
        <rect width="1000" height="600" fill="var(--bg)"/>
        <rect width="1000" height="600" fill="url(#grid-fine)"/>
        <rect width="1000" height="600" fill="url(#grid-coarse)"/>
        <rect width="1000" height="600" filter="url(#noise)" opacity="0.5"/>

        <!-- Background star field (non-interactive) -->
        <g class="starfield">
            <circle cx="45" cy="28" r="0.8" fill="rgba(200,200,212,0.3)"/>
            <circle cx="120" cy="95" r="0.6" fill="rgba(200,200,212,0.2)"/>
            <circle cx="210" cy="42" r="1.0" fill="rgba(200,200,212,0.25)"/>
            <circle cx="330" cy="110" r="0.5" fill="rgba(200,200,212,0.15)"/>
            <circle cx="415" cy="55" r="0.7" fill="rgba(200,200,212,0.2)"/>
            <circle cx="520" cy="30" r="0.9" fill="rgba(200,200,212,0.3)"/>
            <circle cx="640" cy="80" r="0.6" fill="rgba(200,200,212,0.2)"/>
            <circle cx="735" cy="25" r="0.8" fill="rgba(200,200,212,0.25)"/>
            <circle cx="850" cy="65" r="0.5" fill="rgba(200,200,212,0.15)"/>
            <circle cx="920" cy="110" r="0.7" fill="rgba(200,200,212,0.2)"/>
            <circle cx="75" cy="190" r="0.6" fill="rgba(200,200,212,0.2)"/>
            <circle cx="180" cy="260" r="0.9" fill="rgba(200,200,212,0.25)"/>
            <circle cx="290" cy="350" r="0.5" fill="rgba(200,200,212,0.15)"/>
            <circle cx="410" cy="420" r="0.8" fill="rgba(200,200,212,0.3)"/>
            <circle cx="560" cy="480" r="0.6" fill="rgba(200,200,212,0.2)"/>
            <circle cx="670" cy="520" r="0.7" fill="rgba(200,200,212,0.15)"/>
            <circle cx="780" cy="390" r="0.9" fill="rgba(200,200,212,0.25)"/>
            <circle cx="880" cy="450" r="0.5" fill="rgba(200,200,212,0.2)"/>
            <circle cx="950" cy="320" r="0.8" fill="rgba(200,200,212,0.3)"/>
            <circle cx="60" cy="480" r="0.6" fill="rgba(200,200,212,0.2)"/>
            <circle cx="155" cy="540" r="0.7" fill="rgba(200,200,212,0.25)"/>
            <circle cx="500" cy="200" r="0.5" fill="rgba(200,200,212,0.15)"/>
            <circle cx="700" cy="260" r="0.8" fill="rgba(200,200,212,0.2)"/>
            <circle cx="820" cy="180" r="0.6" fill="rgba(200,200,212,0.25)"/>
            <circle cx="380" cy="530" r="0.9" fill="rgba(200,200,212,0.3)"/>
        </g>

        <!-- Constellation: ARMATURE-9 (upper left — industrial, angular) -->
        <g class="constellation constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-armature9"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <line x1="110" y1="130" x2="170" y2="160" class="constellation-line"/>
            <line x1="170" y1="160" x2="160" y2="220" class="constellation-line"/>
            <line x1="170" y1="160" x2="230" y2="145" class="constellation-line"/>
            <line x1="230" y1="145" x2="260" y2="190" class="constellation-line"/>
            <circle cx="110" cy="130" r="2.5" class="star-node"/>
            <circle cx="170" cy="160" r="3" class="star-node"/>
            <circle cx="160" cy="220" r="2" class="star-node"/>
            <circle cx="230" cy="145" r="2.5" class="star-node"/>
            <circle cx="260" cy="190" r="2" class="star-node"/>
            <text x="175" y="240" class="constellation-label">ARMATURE-9</text>
        </g>

        <!-- Constellation: KHR-IV (upper right — compact cluster) -->
        <g class="constellation constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-khr4"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <line x1="720" y1="120" x2="760" y2="150" class="constellation-line"/>
            <line x1="760" y1="150" x2="740" y2="190" class="constellation-line"/>
            <line x1="760" y1="150" x2="800" y2="135" class="constellation-line"/>
            <line x1="800" y1="135" x2="810" y2="175" class="constellation-line"/>
            <line x1="740" y1="190" x2="810" y2="175" class="constellation-line"/>
            <circle cx="720" cy="120" r="2" class="star-node"/>
            <circle cx="760" cy="150" r="3" class="star-node"/>
            <circle cx="740" cy="190" r="2.5" class="star-node"/>
            <circle cx="800" cy="135" r="2" class="star-node"/>
            <circle cx="810" cy="175" r="2.5" class="star-node"/>
            <text x="730" y="210" class="constellation-label">KHR-IV</text>
        </g>

        <!-- Constellation: CYDIAS REACH (mid-left — elongated arc) -->
        <g class="constellation constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-cydias"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <line x1="80" y1="340" x2="140" y2="320" class="constellation-line"/>
            <line x1="140" y1="320" x2="200" y2="350" class="constellation-line"/>
            <line x1="200" y1="350" x2="270" y2="330" class="constellation-line"/>
            <line x1="270" y1="330" x2="310" y2="370" class="constellation-line"/>
            <circle cx="80" cy="340" r="2" class="star-node"/>
            <circle cx="140" cy="320" r="2.5" class="star-node"/>
            <circle cx="200" cy="350" r="3" class="star-node"/>
            <circle cx="270" cy="330" r="2" class="star-node"/>
            <circle cx="310" cy="370" r="2.5" class="star-node"/>
            <text x="140" y="395" class="constellation-label">CYDIAS REACH</text>
        </g>

        <!-- Constellation: ▽ STILLNESS (lower right — sparse, wide) -->
        <g class="constellation constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-stillness"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <line x1="680" y1="380" x2="750" y2="420" class="constellation-line"/>
            <line x1="750" y1="420" x2="830" y2="400" class="constellation-line"/>
            <line x1="830" y1="400" x2="870" y2="450" class="constellation-line"/>
            <line x1="750" y1="420" x2="720" y2="470" class="constellation-line"/>
            <circle cx="680" cy="380" r="2.5" class="star-node"/>
            <circle cx="750" cy="420" r="2" class="star-node"/>
            <circle cx="830" cy="400" r="3" class="star-node"/>
            <circle cx="870" cy="450" r="2" class="star-node"/>
            <circle cx="720" cy="470" r="2.5" class="star-node"/>
            <text x="730" y="495" class="constellation-label">▽ STILLNESS</text>
        </g>

        <!-- Constellation: TRINARY WELL (lower center — triangle form) -->
        <g class="constellation constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-trinary"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <line x1="450" y1="400" x2="520" y2="460" class="constellation-line"/>
            <line x1="520" y1="460" x2="390" y2="480" class="constellation-line"/>
            <line x1="390" y1="480" x2="450" y2="400" class="constellation-line"/>
            <circle cx="450" cy="400" r="2.5" class="star-node"/>
            <circle cx="520" cy="460" r="2" class="star-node"/>
            <circle cx="390" cy="480" r="2.5" class="star-node"/>
            <text x="410" y="510" class="constellation-label">TRINARY WELL</text>
        </g>

        <!-- Focal point: ORIGIN / corm nexus (center, highlighted) -->
        <g class="constellation constellation--focal constellation--clickable"
           hx-post="/phase0/interact" hx-vals='{"element_id":"star-origin"}'
           hx-target="#corm-log" hx-swap="beforeend">
            <circle cx="500" cy="280" r="60" fill="url(#focal-glow)" class="focal-halo"/>
            <line x1="470" y1="260" x2="510" y2="250" class="constellation-line constellation-line--bright"/>
            <line x1="510" y1="250" x2="530" y2="280" class="constellation-line constellation-line--bright"/>
            <line x1="530" y1="280" x2="510" y2="310" class="constellation-line constellation-line--bright"/>
            <line x1="510" y1="310" x2="470" y2="300" class="constellation-line constellation-line--bright"/>
            <line x1="470" y1="300" x2="470" y2="260" class="constellation-line constellation-line--bright"/>
            <circle cx="470" cy="260" r="3" class="star-node star-node--focal"/>
            <circle cx="510" cy="250" r="2.5" class="star-node star-node--focal"/>
            <circle cx="530" cy="280" r="3.5" class="star-node star-node--focal"/>
            <circle cx="510" cy="310" r="2.5" class="star-node star-node--focal"/>
            <circle cx="470" cy="300" r="3" class="star-node star-node--focal"/>
            <text x="480" y="340" class="constellation-label constellation-label--focal">◈ ORIGIN</text>
        </g>

        <!-- Coordinate readout (bottom-left overlay) -->
        <g class="starmap-readout">
            <text x="20" y="570" class="readout-text">EPOCH: UNKNOWN</text>
            <text x="20" y="585" class="readout-text">FRAME: NON-LOCAL</text>
        </g>

        <!-- Scan target controls (top-right overlay) -->
        <g class="starmap-controls">
            <g class="starmap-control-btn"
               hx-post="/phase0/interact" hx-vals='{"element_id":"ctrl-scan"}'
               hx-target="#corm-log" hx-swap="beforeend">
                <rect x="880" y="20" width="100" height="24" rx="2" class="control-btn-bg"/>
                <text x="930" y="36" class="control-btn-text">◉ SCAN</text>
            </g>
            <g class="starmap-control-btn"
               hx-post="/phase0/interact" hx-vals='{"element_id":"ctrl-calibrate"}'
               hx-target="#corm-log" hx-swap="beforeend">
                <rect x="880" y="50" width="100" height="24" rx="2" class="control-btn-bg"/>
                <text x="930" y="66" class="control-btn-text">⟳ CALIBRATE</text>
            </g>
            <g class="starmap-control-btn"
               hx-post="/phase0/interact" hx-vals='{"element_id":"ctrl-ping"}'
               hx-target="#corm-log" hx-swap="beforeend">
                <rect x="880" y="80" width="100" height="24" rx="2" class="control-btn-bg"/>
                <text x="930" y="96" class="control-btn-text">⏣ PING</text>
            </g>
        </g>

        <!-- Ambient scanline -->
        <rect class="starmap-scanline" x="0" y="0" width="1000" height="2" fill="rgba(0,212,255,0.08)"/>
    </svg>
</div>{{end}}
